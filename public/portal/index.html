<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Portal — Midwest 3 on 3</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #FF6B1A;
      --orange-dark: #E55A08;
      --orange-light: #FF8C42;
      --black: #08080A;
      --dark: #0F0F12;
      --dark-2: #17171C;
      --dark-3: #1F1F26;
      --dark-4: #292933;
      --mid: #3D3D4A;
      --text: #F0F0F5;
      --text-muted: #9999B0;
      --green: #22C55E;
      --red: #EF4444;
      --yellow: #F59E0B;
      --radius: 12px;
      --radius-lg: 18px;
    }
    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--black);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── LOCK SCREEN ── */
    #lock-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--black);
      padding: 1.5rem;
    }

    .lock-card {
      background: var(--dark-2);
      border: 1px solid var(--dark-4);
      border-radius: var(--radius-lg);
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.7);
    }

    .lock-icon {
      width: 64px;
      height: 64px;
      background: rgba(255,107,26,0.12);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    .lock-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    .lock-sub {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    .pin-input-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .pin-input {
      flex: 1;
      background: var(--dark-3);
      border: 1px solid var(--dark-4);
      border-radius: 10px;
      color: var(--text);
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.4em;
      text-align: center;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .pin-input:focus { border-color: var(--orange); }
    .pin-input.error { border-color: var(--red); animation: shake 0.4s ease; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-6px); }
      40%,80% { transform: translateX(6px); }
    }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      color: white;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 14px 24px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(255,107,26,0.3);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(255,107,26,0.45); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .lock-error {
      margin-top: 0.75rem;
      color: var(--red);
      font-size: 0.8rem;
      font-weight: 500;
      min-height: 1.2em;
    }

    /* ── MAIN APP ── */
    #app { display: none; min-height: 100vh; }

    .app-header {
      background: var(--dark);
      border-bottom: 1px solid var(--dark-4);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
    }

    .app-header__brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-dot {
      width: 10px;
      height: 10px;
      background: var(--orange);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.05em;
      color: var(--text);
    }

    .brand-sub {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-left: 2px;
    }

    .btn-lock {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--dark-3);
      border: 1px solid var(--dark-4);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 0.78rem;
      font-weight: 600;
      padding: 8px 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-lock:hover { border-color: var(--mid); color: var(--text); }

    .app-body {
      max-width: 960px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    /* ── STATUS CARD ── */
    .status-card {
      background: var(--dark-2);
      border: 1px solid var(--dark-4);
      border-radius: var(--radius-lg);
      padding: 1.75rem 2rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1.5rem;
    }

    .status-card__info {}
    .status-card__title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .status-card__sub {
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    #last-updated { color: var(--orange-light); font-weight: 600; }

    .btn-update {
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      color: white;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 12px 24px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(255,107,26,0.3);
      flex-shrink: 0;
    }
    .btn-update:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(255,107,26,0.45); }
    .btn-update:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-update svg { transition: transform 0.3s; }
    .btn-update.spinning svg { animation: spin 1s linear infinite; }

    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* ── LOG BOX ── */
    .log-wrap {
      background: var(--dark-2);
      border: 1px solid var(--dark-4);
      border-radius: var(--radius-lg);
      margin-bottom: 1.5rem;
      overflow: hidden;
      display: none;
    }
    .log-wrap.active { display: block; }

    .log-header {
      background: var(--dark-3);
      border-bottom: 1px solid var(--dark-4);
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .log-live-dot {
      width: 7px;
      height: 7px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #log-output {
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      color: #A0E0B0;
      background: #0B0F0C;
      padding: 1rem 1.25rem;
      max-height: 340px;
      overflow-y: auto;
      white-space: pre-wrap;
      line-height: 1.7;
    }

    /* ── LEAGUES TABLE ── */
    .leagues-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .leagues-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }
    .leagues-count {
      font-size: 0.78rem;
      background: rgba(255,107,26,0.12);
      color: var(--orange);
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 100px;
      border: 1px solid rgba(255,107,26,0.2);
    }

    .leagues-grid {
      display: grid;
      gap: 0.6rem;
    }

    .league-row {
      background: var(--dark-2);
      border: 1px solid var(--dark-4);
      border-radius: var(--radius);
      padding: 0.9rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      transition: border-color 0.2s;
    }
    .league-row:hover { border-color: var(--mid); }

    .league-row__left { display: flex; align-items: center; gap: 0.75rem; }

    .season-badge {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 100px;
      flex-shrink: 0;
    }
    .season-badge--spring { background: rgba(34,197,94,0.12); color: #4ADE80; border: 1px solid rgba(34,197,94,0.2); }
    .season-badge--summer { background: rgba(245,158,11,0.12); color: #FCD34D; border: 1px solid rgba(245,158,11,0.2); }
    .season-badge--fall   { background: rgba(249,115,22,0.12); color: #FB923C; border: 1px solid rgba(249,115,22,0.2); }
    .season-badge--winter { background: rgba(96,165,250,0.12); color: #93C5FD; border: 1px solid rgba(96,165,250,0.2); }

    .league-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
    }

    .league-row__right { display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0; }

    .status-pill {
      font-size: 0.68rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 100px;
    }
    .status-pill--ok { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
    .status-pill--error { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
    .status-pill--pending { background: rgba(245,158,11,0.12); color: var(--yellow); border: 1px solid rgba(245,158,11,0.2); }

    .league-time {
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .league-link {
      font-size: 0.72rem;
      color: var(--orange);
      text-decoration: none;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid rgba(255,107,26,0.2);
      transition: all 0.15s;
    }
    .league-link:hover { background: rgba(255,107,26,0.08); }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .empty-state__icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .empty-state__title { font-weight: 700; color: var(--text); margin-bottom: 0.25rem; }

    /* Season filter tabs */
    .filter-tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .filter-tab {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 100px;
      border: 1px solid var(--dark-4);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-tab.active, .filter-tab:hover {
      background: rgba(255,107,26,0.1);
      border-color: rgba(255,107,26,0.3);
      color: var(--orange);
    }
  </style>
</head>
<body>

<!-- ── LOCK SCREEN ── -->
<div id="lock-screen">
  <div class="lock-card">
    <div class="lock-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#FF6B1A" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <div class="lock-title">Admin Portal</div>
    <div class="lock-sub">Midwest 3 on 3 · Landing Page Manager</div>

    <div class="pin-input-row">
      <input type="password" id="pin-input" class="pin-input" placeholder="••••"
             maxlength="8" autocomplete="off" inputmode="numeric" />
    </div>

    <button class="btn-primary" id="unlock-btn" onclick="authenticate()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      Unlock
    </button>
    <div class="lock-error" id="lock-error"></div>
  </div>
</div>

<!-- ── MAIN APP ── -->
<div id="app">
  <header class="app-header">
    <div class="app-header__brand">
      <div class="brand-dot"></div>
      <div>
        <div class="brand-name">Midwest 3v3 · Admin Portal</div>
        <div class="brand-sub">Landing Page Generator</div>
      </div>
    </div>
    <button class="btn-lock" onclick="lockPortal()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      Lock
    </button>
  </header>

  <div class="app-body">

    <!-- Status + Update Card -->
    <div class="status-card">
      <div class="status-card__info">
        <div class="status-card__title">League Landing Pages</div>
        <div class="status-card__sub">
          Last updated: <span id="last-updated">Never</span>
        </div>
      </div>
      <button class="btn-update" id="update-btn" onclick="triggerUpdate()">
        <svg id="update-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Update All Leagues
      </button>
    </div>

    <!-- Log Output -->
    <div class="log-wrap" id="log-wrap">
      <div class="log-header">
        <div class="log-live-dot" id="log-dot"></div>
        Live Crawl Log
      </div>
      <div id="log-output"></div>
    </div>

    <!-- Leagues List -->
    <div class="leagues-header">
      <div class="leagues-title">Leagues</div>
      <div class="leagues-count" id="league-count">0 leagues</div>
    </div>

    <div class="filter-tabs" id="filter-tabs">
      <button class="filter-tab active" data-season="all" onclick="filterSeason(this, 'all')">All</button>
      <button class="filter-tab" data-season="spring" onclick="filterSeason(this, 'spring')">Spring</button>
      <button class="filter-tab" data-season="summer" onclick="filterSeason(this, 'summer')">Summer</button>
      <button class="filter-tab" data-season="fall" onclick="filterSeason(this, 'fall')">Fall</button>
      <button class="filter-tab" data-season="winter" onclick="filterSeason(this, 'winter')">Winter</button>
    </div>

    <div class="leagues-grid" id="leagues-grid">
      <div class="empty-state">
        <div class="empty-state__icon">🏀</div>
        <div class="empty-state__title">No leagues yet</div>
        <div>Click "Update All Leagues" to crawl the site and generate landing pages.</div>
      </div>
    </div>

  </div>
</div>

<script>
  var PIN = '';
  var allLeagues = [];
  var currentSeason = 'all';

  // ── Auto-submit on Enter
  document.getElementById('pin-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') authenticate();
  });

  function authenticate() {
    var pin = document.getElementById('pin-input').value.trim();
    if (!pin) return;

    document.getElementById('unlock-btn').disabled = true;
    document.getElementById('lock-error').textContent = '';

    fetch('/api/portal/authenticate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin: pin })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        PIN = pin;
        document.getElementById('lock-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        loadLeagues();
      } else {
        var input = document.getElementById('pin-input');
        input.classList.add('error');
        setTimeout(function() { input.classList.remove('error'); }, 500);
        document.getElementById('lock-error').textContent = 'Incorrect PIN. Please try again.';
      }
    })
    .catch(function() {
      document.getElementById('lock-error').textContent = 'Connection error. Is the server running?';
    })
    .finally(function() {
      document.getElementById('unlock-btn').disabled = false;
    });
  }

  function lockPortal() {
    PIN = '';
    document.getElementById('pin-input').value = '';
    document.getElementById('app').style.display = 'none';
    document.getElementById('lock-screen').style.display = 'flex';
  }

  function loadLeagues() {
    fetch('/api/leagues')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        allLeagues = data.leagues || [];
        if (data.lastUpdated) {
          document.getElementById('last-updated').textContent =
            new Date(data.lastUpdated).toLocaleString();
        }
        renderLeagues(allLeagues);
      })
      .catch(function() {
        document.getElementById('leagues-grid').innerHTML =
          '<div class="empty-state"><div>Could not load leagues data.</div></div>';
      });
  }

  function renderLeagues(leagues) {
    var filtered = currentSeason === 'all' ? leagues : leagues.filter(function(l) { return l.season === currentSeason; });
    document.getElementById('league-count').textContent = filtered.length + ' league' + (filtered.length !== 1 ? 's' : '');

    if (filtered.length === 0) {
      document.getElementById('leagues-grid').innerHTML =
        '<div class="empty-state"><div class="empty-state__icon">🏀</div><div class="empty-state__title">No leagues yet</div><div>Click "Update All Leagues" to crawl and generate landing pages.</div></div>';
      return;
    }

    var html = filtered.map(function(l) {
      var statusClass = l.status === 'ok' ? 'ok' : l.status === 'error' ? 'error' : 'pending';
      var statusText = l.status === 'ok' ? 'Live' : l.status === 'error' ? 'Error' : 'Pending';
      var time = l.lastUpdated ? new Date(l.lastUpdated).toLocaleDateString() : '';
      var url = '/leagues/' + l.season + '/' + l.slug;
      return '<div class="league-row">' +
        '<div class="league-row__left">' +
          '<span class="season-badge season-badge--' + l.season + '">' + l.season + '</span>' +
          '<span class="league-name">' + (l.name || l.slug) + '</span>' +
        '</div>' +
        '<div class="league-row__right">' +
          (time ? '<span class="league-time">' + time + '</span>' : '') +
          '<span class="status-pill status-pill--' + statusClass + '">' + statusText + '</span>' +
          (l.status === 'ok' ? '<a href="' + url + '" target="_blank" class="league-link">View →</a>' : '') +
        '</div>' +
      '</div>';
    }).join('');
    document.getElementById('leagues-grid').innerHTML = html;
  }

  function filterSeason(btn, season) {
    currentSeason = season;
    document.querySelectorAll('.filter-tab').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    renderLeagues(allLeagues);
  }

  function triggerUpdate() {
    var btn = document.getElementById('update-btn');
    var logWrap = document.getElementById('log-wrap');
    var logOutput = document.getElementById('log-output');
    var icon = document.getElementById('update-icon');

    btn.disabled = true;
    btn.classList.add('spinning');
    logWrap.classList.add('active');
    logOutput.textContent = '';

    var evtSource = new EventSource('/api/portal/update?_dummy=' + Date.now());

    // Can't add body to GET with EventSource; use fetch for POST + SSE alternative
    // Use fetch with ReadableStream instead
    evtSource.close();

    logOutput.textContent = 'Connecting...\n';

    fetch('/api/portal/update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin: PIN })
    }).then(function(response) {
      var reader = response.body.getReader();
      var decoder = new TextDecoder();
      var buffer = '';

      function read() {
        reader.read().then(function(result) {
          if (result.done) {
            btn.disabled = false;
            btn.classList.remove('spinning');
            document.getElementById('log-dot').style.background = '#22C55E';
            loadLeagues();
            return;
          }
          buffer += decoder.decode(result.value, { stream: true });
          var lines = buffer.split('\n');
          buffer = lines.pop();
          lines.forEach(function(line) {
            if (line.startsWith('data: ')) {
              try {
                var parsed = JSON.parse(line.slice(6));
                if (parsed.done) {
                  btn.disabled = false;
                  btn.classList.remove('spinning');
                  document.getElementById('log-dot').style.background = '#22C55E';
                  loadLeagues();
                } else if (parsed.message) {
                  logOutput.textContent += parsed.message + '\n';
                  logOutput.scrollTop = logOutput.scrollHeight;
                }
              } catch(e) {}
            }
          });
          read();
        });
      }
      read();
    }).catch(function(err) {
      logOutput.textContent += '\n❌ Connection error: ' + err.message;
      btn.disabled = false;
      btn.classList.remove('spinning');
    });
  }

  // Load leagues if already authenticated (page refresh case — needs re-auth)
</script>
</body>
</html>
